<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>アイデアカード</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--accent:#7c6fff;--green:#48cfad;--red:#ff6b6b;
  --text:#e0e0ff;--muted:#7777aa;--border:#333366;
}
html,body{height:100%;height:100dvh}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;overflow:hidden;user-select:none;
}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding-top:max(env(safe-area-inset-top),12px);
  padding-bottom:10px;padding-left:16px;padding-right:16px;
  flex-shrink:0;
}
.prog-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
.prog-label{font-size:11px;color:var(--muted);letter-spacing:.05em}
.prog-track{height:4px;background:#22224a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .35s ease}
.topbar-btns{display:flex;gap:8px;flex-shrink:0}
.chip{
  background:#1a1a30;border:1.5px solid var(--border);
  color:var(--muted);border-radius:20px;padding:6px 12px;
  font-size:12px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip.active{background:#2a1125;border-color:var(--red);color:var(--red)}
.chip-badge{
  background:var(--red);color:#fff;border-radius:10px;
  padding:1px 6px;font-size:11px;font-weight:700;min-width:18px;text-align:center;
}
.chip-gear{background:#1a1a30;border:1.5px solid var(--border);color:var(--muted)}
.chip-gear.configured{border-color:#2a8844;color:#4c8a66}

/* CARD AREA */
.card-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px 16px;overflow:hidden;min-height:0;
}
.card-scene{
  width:100%;max-width:420px;height:100%;max-height:560px;
  perspective:1200px;
}
.card{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
  border-radius:22px;cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;border-radius:22px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  padding:24px 22px 18px;display:flex;flex-direction:column;overflow:hidden;
}
.face-front{
  background:linear-gradient(150deg,#1e1e38 0%,#25254a 60%,#1a1a30 100%);
  border:1px solid #38386a;
  box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);
}
.face-back{
  background:linear-gradient(150deg,#172030 0%,#1c2e42 60%,#152028 100%);
  border:1px solid #2a4a6a;
  box-shadow:0 12px 40px rgba(0,0,0,.55);
  transform:rotateY(180deg);
}
.card-no{font-size:11px;color:var(--accent);letter-spacing:.2em;font-weight:700;margin-bottom:10px}
.card-name{font-size:28px;font-weight:800;line-height:1.2;color:#fff;margin-bottom:14px;letter-spacing:-.02em}
.card-line{height:1px;background:linear-gradient(90deg,#7c6fff55,#48cfad22,transparent);margin-bottom:14px;flex-shrink:0}
.card-summary{font-size:14.5px;line-height:1.75;color:#b8b8d8;flex:1;overflow-y:auto}
.card-summary::-webkit-scrollbar{width:3px}
.card-summary::-webkit-scrollbar-thumb{background:#4444aa;border-radius:2px}
.card-hint{margin-top:12px;font-size:11px;color:#44449a;text-align:center;flex-shrink:0}
.back-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:16px;flex-shrink:0;line-height:1.3}
.back-scroll{flex:1;overflow-y:auto;min-height:0}
.back-scroll::-webkit-scrollbar{width:3px}
.back-scroll::-webkit-scrollbar-thumb{background:#336688;border-radius:2px}
.back-sec{margin-bottom:16px}
.back-sec:last-child{margin-bottom:0}
.back-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--green);margin-bottom:6px;text-transform:uppercase}
.back-txt{font-size:13.5px;line-height:1.7;color:#a8c0d0}

/* ACTIONS */
.actions{
  display:flex;align-items:center;justify-content:center;gap:22px;
  padding-top:10px;padding-left:16px;padding-right:16px;
  padding-bottom:max(env(safe-area-inset-bottom),20px);
  flex-shrink:0;
}
.btn-nav{
  width:52px;height:52px;border-radius:50%;
  border:1.5px solid #333366;background:#1a1a30;color:#8888bb;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.btn-nav:active{transform:scale(.88);background:#252540}
.btn-nav:disabled{opacity:.25;cursor:default}
.btn-heart{
  width:70px;height:70px;border-radius:50%;
  border:2px solid #ff6b6b44;background:#ff6b6b11;color:var(--red);
  font-size:30px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.btn-heart.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 22px #ff6b6b55}
.btn-heart:active{transform:scale(.85)}

/* ANIMATIONS */
@keyframes swL{to{transform:translateX(-110%) rotate(-12deg) scale(.88);opacity:0}}
@keyframes swR{to{transform:translateX(110%) rotate(12deg) scale(.88);opacity:0}}
@keyframes enR{from{transform:translateX(55%) scale(.9);opacity:0}to{transform:none;opacity:1}}
@keyframes enL{from{transform:translateX(-55%) scale(.9);opacity:0}to{transform:none;opacity:1}}
.swL .card{animation:swL .28s ease forwards}
.swR .card{animation:swR .28s ease forwards}
.enR .card{animation:enR .32s ease forwards}
.enL .card{animation:enL .32s ease forwards}

/* EMPTY */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#44448a;text-align:center;padding:30px;
}
.empty .ico{font-size:52px}
.empty .msg{font-size:15px}
.empty .sub{font-size:13px;color:#333366;line-height:1.6}

/* MODAL */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  width:100%;max-width:480px;
  background:#1a1a2e;border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  padding:24px 20px;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:90dvh;overflow-y:auto;
}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-label{font-size:12px;color:var(--green);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.modal-steps{
  background:#0f0f1a;border-radius:12px;padding:14px;margin-bottom:20px;
  font-size:13px;line-height:1.9;color:#aaaacc;
}
.modal-steps a{color:var(--accent);text-decoration:none}
.modal-steps ol{padding-left:18px}
.modal-steps li{margin-bottom:2px}
.modal-steps code{background:#ffffff15;border-radius:4px;padding:1px 5px;font-size:12px}
.modal-textarea{
  width:100%;background:#0f0f1a;border:1.5px solid var(--border);
  color:var(--text);border-radius:12px;padding:12px;
  font-size:12px;font-family:monospace;line-height:1.5;
  resize:vertical;min-height:140px;outline:none;
}
.modal-textarea:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn-cancel{background:#252540;color:var(--muted);border:1.5px solid var(--border);border-radius:12px;padding:14px 20px;font-size:15px;cursor:pointer}
.status-line{font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:6px}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.s-dot.ok{background:var(--green)}
.s-dot.err{background:var(--red)}
</style>
</head>
<body>

<div class="topbar">
  <div class="prog-wrap">
    <div class="prog-label" id="pLabel">読み込み中...</div>
    <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <div class="topbar-btns">
    <button class="chip" id="btnFav" onclick="toggleFilter()">&#9825; <span class="chip-badge" id="favBadge">0</span></button>
    <button class="chip chip-gear" id="btnGear" onclick="openModal()">&#9881;</button>
  </div>
</div>

<div id="cardArea" class="card-area">
  <div class="card-scene" id="scene">
    <div class="card" id="card" onclick="flip()">
      <div class="face face-front" id="front"></div>
      <div class="face face-back" id="back"></div>
    </div>
  </div>
</div>

<div class="actions" id="actions">
  <button class="btn-nav" id="btnPrev" onclick="go(-1)">&#8592;</button>
  <button class="btn-heart" id="btnHeart" onclick="toggleFav(event)">&#9825;</button>
  <button class="btn-nav" id="btnNext" onclick="go(1)">&#8594;</button>
</div>

<!-- Firebase Config Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">&#9881; Firebase 設定</div>
    <div class="modal-sub">お気に入りをどのデバイスからでも同期できます。設定しない場合はこのデバイスのみに保存されます。</div>
    <div class="modal-steps">
      <ol>
        <li><a href="https://console.firebase.google.com/" target="_blank">Firebase Console</a> を開く</li>
        <li>「プロジェクトを作成」→ 名前を入力</li>
        <li>プロジェクト内で「ウェブアプリ」を追加</li>
        <li>表示された <code>firebaseConfig</code> をコピー</li>
        <li>「Firestore Database」を作成（テストモードでOK）</li>
        <li>下にJSONとして貼り付けて「保存」</li>
      </ol>
    </div>
    <div class="modal-label">firebaseConfig (JSON)</div>
    <textarea class="modal-textarea" id="cfgInput" placeholder="{
  &quot;apiKey&quot;: &quot;AIza...&quot;,
  &quot;authDomain&quot;: &quot;your-app.firebaseapp.com&quot;,
  &quot;projectId&quot;: &quot;your-app&quot;,
  &quot;storageBucket&quot;: &quot;your-app.appspot.com&quot;,
  &quot;messagingSenderId&quot;: &quot;123456789&quot;,
  &quot;appId&quot;: &quot;1:123:web:abc&quot;
}"></textarea>
    <div class="status-line"><span class="s-dot" id="sDot"></span><span id="sText">未設定（このデバイスのみ保存）</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">閉じる</button>
      <button class="btn-save" onclick="saveConfig()">保存して接続</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

// ── DATA ──

// ── STATE ──
let favs = new Set();
let filterOn = false;
let idx = 0;
let flipped = false;
let db = null;
let userId = null;
let unsubFn = null;

// ── LOCAL STORAGE HELPERS ──
function loadLocalFavs() { return new Set(JSON.parse(localStorage.getItem('idea_favs')||'[]')); }
function saveLocalFavs() { localStorage.setItem('idea_favs', JSON.stringify([...favs])); }
function getSavedCfg() { try { return JSON.parse(localStorage.getItem('firebase_cfg')||'null'); } catch { return null; } }

// ── FIREBASE ──
async function initFB(cfg) {
  try {
    const existing = getApps().find(a => a.name === 'idea');
    const app = existing || initializeApp(cfg, 'idea');
    const auth = getAuth(app);
    db = getFirestore(app);
    await signInAnonymously(auth);
    return new Promise(res => onAuthStateChanged(auth, u => { if(u){ userId = u.uid; res(true); } }));
  } catch(e) { console.error(e); db = null; return false; }
}

async function subscribeFirestore() {
  if (!db || !userId) return;
  if (unsubFn) unsubFn();
  const ref = doc(db, 'users', userId);
  unsubFn = onSnapshot(ref, snap => {
    favs = new Set(snap.exists() ? (snap.data().favorites||[]) : []);
    updateBadge(); render();
  });
}

async function writeFavs() {
  if (db && userId) {
    await setDoc(doc(db,'users',userId), { favorites:[...favs], ts: Date.now() });
  } else {
    saveLocalFavs();
  }
}

// ── MODAL ──
window.openModal = function() {
  const cfg = getSavedCfg();
  if (cfg) document.getElementById('cfgInput').value = JSON.stringify(cfg, null, 2);
  setStatus(db && userId ? 'ok' : cfg ? 'err' : '');
  document.getElementById('overlay').classList.add('open');
};
window.closeModal = function() { document.getElementById('overlay').classList.remove('open'); };
window.closeModalOutside = function(e) { if(e.target===document.getElementById('overlay')) closeModal(); };
window.saveConfig = async function() {
  let cfg;
  try { cfg = JSON.parse(document.getElementById('cfgInput').value.trim()); }
  catch { alert('JSONの形式が正しくありません'); return; }
  localStorage.setItem('firebase_cfg', JSON.stringify(cfg));
  setStatus('', '接続中...');
  const ok = await initFB(cfg);
  if (ok) {
    setStatus('ok', 'Firebase接続成功！');
    document.getElementById('btnGear').classList.add('configured');
    await subscribeFirestore();
    setTimeout(closeModal, 1200);
  } else {
    setStatus('err', '接続失敗。設定を確認してください。');
  }
};

function setStatus(state, text) {
  const dot = document.getElementById('sDot');
  const txt = document.getElementById('sText');
  dot.className = 's-dot' + (state==='ok' ? ' ok' : state==='err' ? ' err' : '');
  txt.textContent = text || (
    state==='ok' ? 'Firebase接続済み (uid:' + (userId||'').slice(0,8) + '...)' :
    state==='err' ? '設定あり・接続失敗' :
    '未設定（このデバイスのみ保存）'
  );
}

// ── UTILS ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pool(){ return filterOn ? DATA.filter(c=>favs.has(c.no)) : DATA; }
function updateBadge(){ document.getElementById('favBadge').textContent = favs.size; }

function sceneHTML(){ return `<div class="card-scene" id="scene"><div class="card" id="card" onclick="flip()"><div class="face face-front" id="front"></div><div class="face face-back" id="back"></div></div></div>`; }

function bindTouch(){
  const s = document.getElementById('scene');
  if (!s) return;
  let tx=0,ty=0;
  s.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
  s.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44) go(dx<0?1:-1);
  },{passive:true});
}

// ── RENDER ──
window.render = function() {
  const list = pool();
  updateBadge();
  const ca = document.getElementById('cardArea');
  if (list.length===0){
    ca.innerHTML=`<div class="empty"><div class="ico">&#x1F90D;</div><div class="msg">お気に入りはまだありません</div><div class="sub">カードの &#9825; を押して<br>お気に入りに追加できます</div></div>`;
    document.getElementById('actions').style.display='none';
    return;
  }
  document.getElementById('actions').style.display='';
  if (!document.getElementById('scene')){ ca.innerHTML=sceneHTML(); bindTouch(); }
  idx = Math.max(0,Math.min(idx,list.length-1));
  const c = list[idx];
  const pct = list.length>1 ? (idx/(list.length-1)*100).toFixed(1) : 100;
  document.getElementById('pLabel').textContent=(idx+1)+' / '+list.length;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('btnPrev').disabled=idx<=0;
  document.getElementById('btnNext').disabled=idx>=list.length-1;
  const isFav=favs.has(c.no);
  const hb=document.getElementById('btnHeart');
  hb.innerHTML=isFav?'&#9829;':'&#9825;';
  hb.classList.toggle('on',isFav);
  document.getElementById('front').innerHTML=`
    <div class="card-no">No.${String(c.no).padStart(2,'0')}</div>
    <div class="card-name">${esc(c.name)}</div>
    <div class="card-line"></div>
    <div class="card-summary">${esc(c.summary)}</div>
    <div class="card-hint">&#9660; タップして詳細</div>`;
  let bk=`<div class="back-name">${esc(c.name)}</div><div class="back-scroll">`;
  if(c.parent) bk+=`<div class="back-sec"><div class="back-lbl">強みと親和性</div><div class="back-txt">${esc(c.parent)}</div></div>`;
  if(c.detail) bk+=`<div class="back-sec"><div class="back-lbl">詳細</div><div class="back-txt">${esc(c.detail)}</div></div>`;
  if(c.other&&c.other!=='None') bk+=`<div class="back-sec"><div class="back-lbl">その他</div><div class="back-txt">${esc(c.other)}</div></div>`;
  bk+=`</div>`;
  document.getElementById('back').innerHTML=bk;
  const card=document.getElementById('card');
  if(flipped){ card.classList.remove('flipped'); flipped=false; }
};

// ── INTERACTIONS ──
window.flip = function(){
  const card=document.getElementById('card');
  if(!card) return;
  flipped=!flipped;
  card.classList.toggle('flipped',flipped);
};
window.go = function(dir){
  const list=pool(), next=idx+dir;
  if(next<0||next>=list.length) return;
  const scene=document.getElementById('scene');
  if(!scene) return;
  const out=dir>0?'swL':'swR', inn=dir>0?'enR':'enL';
  scene.classList.add(out);
  setTimeout(()=>{
    scene.classList.remove(out);
    idx=next; flipped=false; render();
    requestAnimationFrame(()=>{
      const s2=document.getElementById('scene');
      if(s2){ s2.classList.add(inn); setTimeout(()=>s2.classList.remove(inn),350); }
    });
  },260);
};
window.toggleFav = async function(e){
  e.stopPropagation();
  const list=pool();
  if(!list.length) return;
  const c=list[idx];
  if(favs.has(c.no)) { favs.delete(c.no); }
  else {
    favs.add(c.no);
    const hb=document.getElementById('btnHeart');
    if(hb){ hb.style.transform='scale(1.3)'; setTimeout(()=>hb.style.transform='',200); }
  }
  if(filterOn&&!favs.has(c.no)) idx=Math.min(idx,Math.max(0,pool().length-1));
  await writeFavs();
  render();
};
window.toggleFilter = function(){
  filterOn=!filterOn; idx=0; flipped=false;
  document.getElementById('btnFav').classList.toggle('active',filterOn);
  const ca=document.getElementById('cardArea');
  if(!document.getElementById('scene')){ ca.innerHTML=sceneHTML(); bindTouch(); }
  render();
};

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(1);
  else if(e.key==='ArrowLeft') go(-1);
  else if(e.key===' '){ e.preventDefault(); flip(); }
  else if(e.key==='f') toggleFav(e);
});

// ── BOOT ──
async function boot() {
  const cfg = getSavedCfg();
  if (cfg) {
    const ok = await initFB(cfg);
    if (ok) {
      document.getElementById('btnGear').classList.add('configured');
      await subscribeFirestore();
      return;
    }
  }
  favs = loadLocalFavs();
  updateBadge();
  bindTouch();
  render();
}
boot();
</script>
